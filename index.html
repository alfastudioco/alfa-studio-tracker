async function dbLoad(table) {
  try {
    const r = await fetch(SB_URL+"/rest/v1/"+table+"?select=*&order=id", {
      method: "GET",
      mode: "cors",
      headers: SB_HEADERS
    });
    if (!r.ok) { console.error("dbLoad failed", table, r.status); return null; }
    const rows = await r.json();
    if (!Array.isArray(rows) || rows.length===0) return null;
    return rows.map(row => row.data);
  } catch(e) { console.error("dbLoad error", table, e.message); return null; }
}

async function dbSave(table, items) {
  try {
    if (!items || items.length === 0) return;
    const body = items.map(item => ({id: String(item.id), data: item}));
    const r = await fetch(SB_URL+"/rest/v1/"+table, {
      method: "POST",
      mode: "cors",
      headers: {...SB_HEADERS, "Prefer": "resolution=merge-duplicates,return=minimal"},
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      const txt = await r.text();
      console.error("dbSave failed", table, r.status, txt);
    }
  } catch(e) { console.error("dbSave error", table, e.message); }
}

async function dbDelete(table, keepIds) {
  try {
    if (!keepIds || keepIds.length === 0) return;
    const ids = keepIds.map(i => String(i)).join(",");
    await fetch(SB_URL+"/rest/v1/"+table+"?id=not.in.("+ids+")", {
      method: "DELETE", mode: "cors", headers: SB_HEADERS
    });
  } catch(e) { console.error("dbDelete error", table, e.message); }
}

async function dbPushAll(emps, projs, entries) {
  await Promise.all([
    dbSave("employees", emps),
    dbSave("projects",  projs),
    dbSave("entries",   entries),
    dbDelete("employees", emps.map(x=>String(x.id))),
    dbDelete("projects",  projs.map(x=>String(x.id))),
    dbDelete("entries",   entries.map(x=>String(x.id))),
  ]);
}

// ── Helpers ────────────────────────────────────────────────
function fmtHrs(ms){
  const h=ms/3600000;
  if(h<0.017)return"—";
  if(h<1)return Math.round(h*60)+"m";
  const hrs=Math.floor(h),mins=Math.round((h-hrs)*60);
  return mins>0?`${hrs}h ${mins}m`:`${hrs}h`;
}
function fmtTime(ms){return new Date(ms).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fmtDate(ms){return new Date(ms).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});}
function dayKey(ms){const d=new Date(ms);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function dayLabel(key){
  const tk=dayKey(Date.now()),yk=dayKey(Date.now()-86400000);
  if(key===tk)return"Today"; if(key===yk)return"Yesterday";
  const[y,m,d]=key.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
}

// ── PinScreen ──────────────────────────────────────────────
function PinScreen({onSuccess,onCancel}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);

  function press(k){
    if(k==="⌫"){setPin(p=>p.slice(0,-1));setError(false);return;}
    const next=pin+k;
    setPin(next);setError(false);
    if(next.length===4){
      if(next===ADMIN_PIN){onSuccess();}
      else{setError(true);setTimeout(()=>{setPin("");setError(false);},600);}
    }
  }

  // Keyboard support
  useEffect(()=>{
    function onKey(e){
      if(e.key>="0"&&e.key<="9") press(e.key);
      else if(e.key==="Backspace") press("⌫");
      else if(e.key==="Escape") onCancel();
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[pin]);

  return h("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
    h("div",{style:{background:T.surf,borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.1)",textAlign:"center"}},

      h("div",{style:{fontSize:18,fontWeight:800,color:T.text,marginBottom:4}},"Admin Access"),

      h("div",{style:{display:"flex",justifyContent:"center",gap:12,marginBottom:28}},
        [0,1,2,3].map(i=>h("div",{key:i,style:{width:14,height:14,borderRadius:"50%",background:pin.length>i?(error?"#DC2626":T.text):T.border,transition:"background .15s"}}))
      ),
      // numpad
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}},
        [1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>
          h("button",{key:i,onClick:()=>k!==""&&press(String(k)),style:{
            background:k===""?"transparent":T.faint,
            border:"1px solid "+(k===""?"transparent":T.border),
            borderRadius:12,padding:"16px 0",
            fontSize:k==="⌫"?18:20,fontWeight:600,
            color:error?"#DC2626":T.text,
            cursor:k===""?"default":"pointer",
          }},k)
        )
      ),
      h("button",{onClick:onCancel,style:{background:"none",border:"none",color:T.sub,fontSize:13,cursor:"pointer",padding:"8px 16px"}},"Cancel")
    )
  );
}

// ── WorkerLogCard ──────────────────────────────────────────
function WorkerLogCard({emp,entries,projs,onDelete}){
  const [open,setOpen]=useState({});
  const toggle=pid=>setOpen(p=>({...p,[pid]:!p[pid]}));
  const projMap={};
  entries.filter(e=>e.end).forEach(e=>{
    if(!projMap[e.projId])projMap[e.projId]={ms:0,items:[]};
    projMap[e.projId].ms+=(e.end-e.start);
    projMap[e.projId].items.push(e);
  });
  const groups=Object.entries(projMap).map(([pid,pg])=>({
    pid:+pid,proj:projs.find(x=>x.id===+pid),ms:pg.ms,
    items:pg.items.sort((a,b)=>b.start-a.start),
  })).sort((a,b)=>b.ms-a.ms);
  const total=groups.reduce((s,g)=>s+g.ms,0);

  return h("div",{style:{background:T.surf,border:"1px solid "+T.border,borderRadius:12,marginBottom:12,overflow:"hidden"}},
    h("div",{style:{padding:"14px 16px",borderBottom:"1px solid "+T.line,display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{width:10,height:10,borderRadius:"50%",background:emp.color,flexShrink:0}}),
      h("span",{style:{fontWeight:700,fontSize:14,flex:1,color:T.text}},emp.name),
      h("span",{style:{fontSize:12,color:T.sub}},emp.role),
      h("span",{style:{fontSize:14,fontWeight:700,color:T.amber,marginLeft:8}},fmtHrs(total))
    ),
    h("div",{style:{padding:"10px 16px"}},
      groups.map(g=>{
        const isOpen=!!open[g.pid];
        const pColor=g.proj?SC[g.proj.status]||T.dim:T.dim;
        return h("div",{key:g.pid,style:{marginBottom:4}},
          h("div",{onClick:()=>toggle(g.pid),style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.faint,borderRadius:8,cursor:"pointer",borderLeft:"3px solid "+pColor}},
            h("span",{style:{flex:1,fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},g.proj?.name||"Unknown"),
            h("span",{style:{fontSize:13,fontWeight:700,color:T.amber}},fmtHrs(g.ms)),
            h("span",{style:{fontSize:11,color:T.dim,marginLeft:2}},isOpen?"▲":"▼")
          ),
          isOpen&&h("div",{style:{paddingLeft:12,paddingTop:3}},
            g.items.map(e=>h("div",{key:e.id,style:{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid "+T.line}},
              h("span",{style:{fontSize:12,color:T.sub,minWidth:90,flexShrink:0}},fmtDate(e.start)),
              h("span",{style:{fontSize:11,color:T.dim,flexShrink:0}},fmtTime(e.start)+"–"+fmtTime(e.end)),
              h("span",{style:{flex:1}}),
              h("span",{style:{fontSize:13,fontWeight:600,color:T.text}},fmtHrs(e.end-e.start)),
              h("button",{onClick:ev=>{ev.stopPropagation();onDelete(e);},style:{background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}},"×")
            ))
          )
        );
      })
    )
  );
}


// ── ImportSheet ────────────────────────────────────────────
function ImportSheet({emps, projs, onClose, onSave}) {
  const [step, setStep] = useState("paste"); // "paste" | "review"
  const [raw, setRaw] = useState("");
  const [rows, setRows] = useState([]);
  const [parseError, setParseError] = useState("");

  const selStyle = {width:"100%",background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:6,color:"#1C1917",padding:"8px 10px",fontSize:13,outline:"none",appearance:"none"};
  const lbl = txt => h("div",{style:{fontSize:10,fontWeight:600,color:"#78716C",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}},txt);

  function parseRaw() {
    setParseError("");
    const lines = raw.trim().split("\n").filter(l=>l.trim());
    if (!lines.length) { setParseError("Nothing to parse."); return; }
    const parsed = lines.map((line,i) => {
      // split by tab (Excel) or comma
      const cols = line.includes("\t") ? line.split("\t") : line.split(",");
      const [empCol="", projCol="", dateCol="", hoursCol=""] = cols.map(c=>c.trim().replace(/^"|"$/g,""));
      // Try to match employee by name (case insensitive partial)
      const emp = emps.find(e=>e.name.toLowerCase().includes(empCol.toLowerCase())) || null;
      const proj = projs.find(p=>p.name.toLowerCase().includes(projCol.toLowerCase())) || null;
      // Parse date — try various formats
      let dateVal = "";
      if (dateCol) {
        const d = new Date(dateCol);
        if (!isNaN(d)) dateVal = d.toISOString().slice(0,10);
        else dateVal = new Date().toISOString().slice(0,10);
      } else {
        dateVal = new Date().toISOString().slice(0,10);
      }
      const hours = parseFloat(hoursCol) || "";
      return { id: Date.now()+i+Math.random(), empId: emp?String(emp.id):"", projId: proj?String(proj.id):"", date: dateVal, hours: String(hours), rawEmp: empCol, rawProj: projCol };
    });
    setRows(parsed);
    setStep("review");
  }

  function updateRow(id, field, val) {
    setRows(p=>p.map(r=>r.id===id?{...r,[field]:val}:r));
  }

  const valid = rows.filter(r=>r.empId&&r.projId&&r.hours&&+r.hours>0);

  function doImport() {
    const entries = valid.map(r=>{
      const ms=+r.hours*3600000;
      const base=new Date(r.date+"T07:00:00").getTime();
      return {id:Date.now()+Math.floor(Math.random()*1000),empId:+r.empId,projId:+r.projId,start:base,end:base+ms};
    });
    onSave(entries);
  }

  return h(Sheet,{title:"Import from Spreadsheet",onClose},

    // STEP 1 — Paste
    step==="paste"&&h("div",null,
      h("div",{style:{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#166534",lineHeight:1.7}},
        h("strong",null,"How to paste from Excel:"),h("br"),
        "1. In Excel, select columns in this order:",h("br"),
        h("code",{style:{background:"#DCFCE7",padding:"1px 5px",borderRadius:3,fontSize:11}},"Employee  |  Project  |  Date  |  Hours"),h("br"),
        "2. Copy (Ctrl+C / Cmd+C)",h("br"),
        "3. Paste below (Ctrl+V / Cmd+V)",h("br"),
        h("span",{style:{color:"#14532D",fontSize:11}},"Employee & project names are matched automatically. You can fix any mismatches on the next screen.")
      ),
      h("textarea",{
        value:raw,
        onChange:e=>setRaw(e.target.value),
        placeholder:"Paste your spreadsheet data here…",
        style:{width:"100%",minHeight:160,background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:8,color:"#1C1917",padding:"10px 12px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"monospace",boxSizing:"border-box",marginBottom:8}
      }),
      parseError&&h("div",{style:{fontSize:12,color:"#DC2626",marginBottom:8}},parseError),
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h(Btn,{label:"Cancel",variant:"ghost",onClick:onClose}),
        h("button",{onClick:parseRaw,style:{background:"#1C1917",color:"#FFF",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}},
          "Preview →")
      )
    ),

    // STEP 2 — Review & fix
    step==="review"&&h("div",null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("span",{style:{fontSize:12,color:"#78716C"}},"Review "+rows.length+" row"+(rows.length!==1?"s":"")+". Fix any mismatches below."),
        h("button",{onClick:()=>setStep("paste"),style:{background:"none",border:"none",color:"#78716C",fontSize:12,cursor:"pointer",textDecoration:"underline"}},"← Back")
      ),

      rows.map((row,i)=>{
        const hasIssue = !row.empId||!row.projId||!row.hours||+row.hours<=0;
        return h("div",{key:row.id,style:{background:hasIssue?"#FFF7ED":"#F5F3F0",border:"1px solid "+(hasIssue?"#FED7AA":"#E5E2DC"),borderRadius:8,padding:"10px 12px",marginBottom:8}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            h("span",{style:{fontSize:11,fontWeight:700,color:hasIssue?"#D97706":"#78716C"}},
              hasIssue?"⚠ Row "+(i+1)+" needs attention":"✓ Row "+(i+1)
            ),
            h("button",{onClick:()=>setRows(p=>p.filter(r=>r.id!==row.id)),style:{background:"none",border:"none",color:"#A8A29E",cursor:"pointer",fontSize:15,lineHeight:1}},"×")
          ),
          // All 4 fields in a 2x2 grid
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
            h("div",null,
              lbl("Employee"+(row.rawEmp&&!row.empId?" (not matched)":"")),
              h("select",{value:row.empId,onChange:e=>updateRow(row.id,"empId",e.target.value),style:{...selStyle,borderColor:!row.empId?"#FCA5A5":"#E5E2DC"}},
                h("option",{value:""},"Select…"),
                emps.map(e=>h("option",{key:e.id,value:e.id},e.name))
              )
            ),
            h("div",null,
              lbl("Project"+(row.rawProj&&!row.projId?" (not matched)":"")),
              h("select",{value:row.projId,onChange:e=>updateRow(row.id,"projId",e.target.value),style:{...selStyle,borderColor:!row.projId?"#FCA5A5":"#E5E2DC"}},
                h("option",{value:""},"Select…"),
                projs.map(p=>h("option",{key:p.id,value:p.id},p.name))
              )
            ),
            h("div",null,
              lbl("Date"),
              h("input",{type:"date",value:row.date,onChange:e=>updateRow(row.id,"date",e.target.value),style:selStyle})
            ),
            h("div",null,
              lbl("Hours"),
              h("input",{type:"number",min:0,step:0.5,value:row.hours,onChange:e=>updateRow(row.id,"hours",e.target.value),style:{...selStyle,borderColor:(!row.hours||+row.hours<=0)?"#FCA5A5":"#E5E2DC"}})
            )
          )
        );
      }),

      h("div",{style:{background:"#F5F3F0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#78716C",display:"flex",justifyContent:"space-between"}},
        h("span",null,valid.length+" of "+rows.length+" rows ready"),
        rows.length!==valid.length&&h("span",{style:{color:"#D97706"}},(rows.length-valid.length)+" with issues will be skipped")
      ),
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h(Btn,{label:"Cancel",variant:"ghost",onClick:onClose}),
        h("button",{
          onClick:doImport,
          disabled:!valid.length,
          style:{background:valid.length?"#1C1917":"#E5E2DC",color:valid.length?"#FFF":"#A8A29E",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:valid.length?"pointer":"default"}
        },"✓ Import "+valid.length+" Entr"+(valid.length!==1?"ies":"y"))
      )
    )
  );
}

// ── Main App ───────────────────────────────────────────────
function App(){
  const [emps,setEmps]       = useState(()=>load("alfa_emps",   DEFAULT_EMPS));
  const [projs,setProjs]     = useState(()=>load("alfa_projs",  DEFAULT_PROJS));
  const [entries,setEntries] = useState(()=>load("alfa_entries",DEFAULT_ENTRIES));
  const [dbReady,setDbReady] = useState(false);
  const [syncing,setSyncing] = useState(false);

  // Load from Supabase on mount, fall back to localStorage
  useEffect(()=>{
    (async()=>{
      try {
        const [e,p,en] = await Promise.all([dbLoad("employees"),dbLoad("projects"),dbLoad("entries")]);
        if(e&&e.length>0)  setEmps(e);
        if(p&&p.length>0)  setProjs(p);
        if(en!==null) setEntries(en.length>=0?en:[]);
      } catch(err) {
        console.error("Initial load error", err);
      }
      setDbReady(true);
    })();
  },[]);
  const [mode,setMode]       = useState("worker");
  const [selectedEmp,setSelectedEmp] = useState(null); // "worker"|"pin"|"admin"
  const [adminTab,setAdminTab] = useState("projects");
  const [expandProj,setExpandProj] = useState(null);
  const [expandCrew,setExpandCrew] = useState(null);
  const [empDrafts,setEmpDrafts] = useState({}); // {id: {name,role,rate}}
  const [empSheet,setEmpSheet]   = useState(null);
  const [editingProj,setEditingProj] = useState(null); // proj id being edited inline
  const [projFilter,setProjFilter] = useState("All");
  const [logRange,setLogRange] = useState("week");
  const [weekOffset,setWeekOffset] = useState(0);
  const [logProjFilter,setLogProjFilter] = useState("all"); // "all" or proj.id
  const [summaryOpen,setSummaryOpen] = useState(true);
  const [importSheet,setImportSheet] = useState(false);
  const [showArchived,setShowArchived] = useState(false);
  const [importRows,setImportRows] = useState([]);
  const [editingEmp,setEditingEmp]   = useState(null); // emp id being edited inline
  const [projSheet,setProjSheet] = useState(null);
  const [logSheet,setLogSheet]   = useState(null);
  const [confirmEntry,setConfirmEntry] = useState(null);
  const [ef,setEf] = useState({name:"",role:ROLES[0],rate:""});
  const [pf,setPf] = useState({name:"",client:"",status:"Not Started",deadline:"",assignedTo:[]});
  const [lf,setLf] = useState({empId:"",projId:"",hours:"",date:new Date().toISOString().slice(0,10)});

  // Persist — use ref to skip first render so we don't overwrite Supabase on load
  const isFirstRender = React.useRef({emps:true, projs:true, entries:true});

  useEffect(()=>{
    try{localStorage.setItem("alfa_emps",JSON.stringify(emps));}catch{}
    if(isFirstRender.current.emps){ isFirstRender.current.emps=false; return; }
    dbSave("employees", emps);
  },[emps]);

  useEffect(()=>{
    try{localStorage.setItem("alfa_projs",JSON.stringify(projs));}catch{}
    if(isFirstRender.current.projs){ isFirstRender.current.projs=false; return; }
    dbSave("projects", projs);
  },[projs]);

  useEffect(()=>{
    try{localStorage.setItem("alfa_entries",JSON.stringify(entries));}catch{}
    if(isFirstRender.current.entries){ isFirstRender.current.entries=false; return; }
    dbSave("entries", entries);
  },[entries]);

  const done    = entries.filter(e=>e.end);
  const active  = entries.filter(e=>!e.end);
  const totalMs = done.reduce((s,e)=>s+(e.end-e.start),0);
  const activeProjs = projs.filter(p=>p.status!=="Completed");
  const activeEmps = emps.filter(e=>!e.archived);
  const archivedEmps = emps.filter(e=>e.archived);

  function activeFor(eid,pid){return entries.find(e=>e.empId===eid&&e.projId===pid&&!e.end);}
  function projMs(pid){return done.filter(e=>e.projId===pid).reduce((s,e)=>s+(e.end-e.start),0);}
  function empMs(eid){return done.filter(e=>e.empId===eid).reduce((s,e)=>s+(e.end-e.start),0);}

  function fmtCost(dollars){ return "$"+dollars.toFixed(2); }
  function entryCost(e){ const emp=emps.find(x=>x.id===e.empId); return emp&&emp.rate?(e.end-e.start)/3600000*emp.rate:0; }
  function clockIn(eid,pid){
    if(activeFor(eid,pid))return;
    const now=Date.now();
    setEntries(p=>[...p.map(e=>e.empId===eid&&!e.end?{...e,end:now}:e),{id:now+1,empId:eid,projId:pid,start:now,end:null}]);
  }
  function clockOut(id){setEntries(p=>p.map(e=>e.id===id?{...e,end:Date.now()}:e));}
  async function manualSync() {
    setSyncing(true);
    try {
      await Promise.all([dbSave("employees",emps),dbSave("projects",projs),dbSave("entries",entries)]);
    } catch(e) { console.error("manualSync error", e); }
    setSyncing(false);
  }
  function deleteEntry(id){setEntries(p=>p.filter(e=>e.id!==id));setConfirmEntry(null);}

  function saveEmp(){
    if(!ef.name.trim())return;
    if(empSheet==="add") setEmps(p=>[...p,{id:Date.now(),name:ef.name,role:ef.role,color:COLORS[p.length%COLORS.length],rate:+ef.rate||0}]);
    else setEmps(p=>p.map(e=>e.id===empSheet.id?{...e,...ef,rate:+ef.rate||0}:e));
    setEmpSheet(null);
  }
  function delEmp(id){
    setEmps(p=>p.filter(e=>e.id!==id));
    setEntries(p=>p.filter(e=>e.empId!==id));
    setProjs(p=>p.map(x=>({...x,assignedTo:x.assignedTo.filter(i=>i!==id)})));
  }
  function archiveEmp(id){ setEmps(p=>p.map(e=>e.id===id?{...e,archived:true}:e)); }
  function unarchiveEmp(id){ setEmps(p=>p.map(e=>e.id===id?{...e,archived:false}:e)); }
  function saveProj(){
    if(!pf.name.trim())return;
    if(projSheet==="add") setProjs(p=>[...p,{id:Date.now(),...pf}]);
    else setProjs(p=>p.map(x=>x.id===projSheet.id?{...x,...pf}:x));
    setProjSheet(null);
  }
  function delProj(id){setProjs(p=>p.filter(x=>x.id!==id));setEntries(p=>p.filter(e=>e.projId!==id));}
  function togAssign(id){setPf(f=>({...f,assignedTo:f.assignedTo.includes(id)?f.assignedTo.filter(i=>i!==id):[...f.assignedTo,id]}));}
  function saveLog(){
    const{empId,projId,hours,date}=lf;
    if(!empId||!projId||!hours||isNaN(+hours)||+hours<=0)return;
    const ms=+hours*3600000,base=new Date(date+"T07:00:00").getTime();
    setEntries(p=>[...p,{id:Date.now(),empId:+empId,projId:+projId,start:base,end:base+ms}]);
    setLogSheet(null);
  }

  const card={background:T.surf,border:"1px solid "+T.border,borderRadius:12,overflow:"hidden"};
  const secLabel={fontSize:11,fontWeight:700,color:T.dim,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:10};

  // ── PIN screen ─────────────────────────────────────────
  if(mode==="pin") return h(PinScreen,{
    onSuccess:()=>setMode("admin"),
    onCancel:()=>setMode("worker"),
  });

  return h("div",{style:{minHeight:"100vh",background:T.bg,color:T.text}},

    // HEADER
    h("div",{style:{background:T.surf,borderBottom:"1px solid "+T.border,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:10}},
      h("div",{style:{display:"flex",alignItems:"center",gap:8}},
        h("div",{style:{width:28,height:28,borderRadius:6,background:T.text,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
          h("span",{style:{color:"#FFF",fontSize:14,fontWeight:900,letterSpacing:"-1px"}},"Α")
        ),
        h("div",null,
          h("div",{style:{fontSize:15,fontWeight:800,color:T.text,letterSpacing:"-0.4px",lineHeight:1}},"Alfa Studio"),
          h("div",{style:{display:"flex",alignItems:"center",gap:6,marginTop:1}},
            h("div",{style:{fontSize:9,color:dbReady?T.green:T.amber,letterSpacing:"0.12em",textTransform:"uppercase"}},dbReady?"✦ LIVE":"⟳ CONNECTING…"),
            mode==="admin"&&h("button",{onClick:manualSync,style:{fontSize:9,color:T.sub,background:T.faint,border:"1px solid "+T.border,borderRadius:4,padding:"1px 6px",cursor:"pointer",letterSpacing:"0.06em"}},syncing?"syncing…":"↑ sync")
          )
        )
      ),
      h("div",{style:{display:"flex",background:T.faint,borderRadius:10,padding:3,gap:2}},
        h("button",{onClick:()=>setMode("worker"),style:{padding:"5px 14px",background:mode==="worker"?T.surf:"transparent",color:mode==="worker"?T.text:T.sub,border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,boxShadow:mode==="worker"?"0 1px 4px rgba(0,0,0,0.08)":"none"}},"Worker"),
        h("button",{onClick:()=>mode==="admin"?setMode("worker"):setMode("pin"),style:{padding:"5px 14px",background:mode==="admin"?T.surf:"transparent",color:mode==="admin"?T.text:T.sub,border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600,boxShadow:mode==="admin"?"0 1px 4px rgba(0,0,0,0.08)":"none"}},"Admin")
      )
    ),

    // ═══ WORKER VIEW ═══
    mode==="worker"&&h("div",{style:{padding:"16px 16px 40px",maxWidth:1200,margin:"0 auto"}},

      // Active banner
      active.length>0&&h("div",{style:{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:12,padding:"12px 16px",marginBottom:16}},
        h("div",{style:{fontSize:11,fontWeight:700,color:T.amber,letterSpacing:"0.06em",marginBottom:8}},"● CLOCKED IN"),
        active.map(e=>{
          const emp=emps.find(x=>x.id===e.empId),proj=projs.find(x=>x.id===e.projId);
          if(!emp||!proj)return null;
          return h("div",{key:e.id,style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            h("span",{style:{fontWeight:600,fontSize:13,color:emp.color,minWidth:60}},emp.name),
            h("span",{style:{flex:1,fontSize:12,color:T.sub,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},proj.name),
            h("span",{style:{fontSize:11,color:T.dim}},"since "+fmtTime(e.start)),
            h("span",{style:{fontSize:12,fontWeight:700,color:T.amber,minWidth:36,textAlign:"right"}},h(LiveTimer,{start:e.start}))
          );
        })
      ),

      // Employee cards — 2 columns, always visible
      h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:12}},

        activeEmps.map(emp=>{
          const isClockedIn=active.some(e=>e.empId===emp.id);
          return h("div",{key:emp.id,style:{background:T.surf,border:"2px solid "+emp.color,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 12px "+emp.color+"22"}},
            // Name header
            h("div",{style:{padding:"10px 12px",background:emp.color+"18",display:"flex",alignItems:"center",gap:8}},
              h("div",{style:{width:28,height:28,borderRadius:"50%",background:emp.color+"22",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
                h("span",{style:{fontSize:13,fontWeight:800,color:emp.color}},emp.name[0])
              ),
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontSize:13,fontWeight:800,color:T.text,letterSpacing:"-0.2px"}},emp.name),
                h("div",{style:{fontSize:10,color:T.sub}},emp.role)
              ),
              isClockedIn&&h("div",{style:{width:7,height:7,borderRadius:"50%",background:T.green,flexShrink:0}})
            ),
            h("div",{style:{height:1,background:emp.color+"22"}}),
            // Projects
            h("div",{style:{padding:"8px 10px",display:"flex",flexDirection:"column",gap:5}},
              activeProjs.length===0&&h("span",{style:{fontSize:11,color:T.dim,padding:"4px 0"}},"No active projects."),
              activeProjs.map(proj=>{
                const act=activeFor(emp.id,proj.id);
                return h("div",{key:proj.id,style:{background:act?emp.color+"15":T.faint,border:"1.5px solid "+(act?emp.color+"66":T.border),borderRadius:10,padding:"8px 10px"}},
                  h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                    h("div",{style:{flex:1,minWidth:0}},
                      h("div",{style:{fontSize:12,fontWeight:700,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},proj.name),
                      act&&h("div",{style:{fontSize:10,color:emp.color,fontWeight:500,marginTop:2}},
                        fmtTime(act.start)+" · ",h("strong",null,h(LiveTimer,{start:act.start}))
                      )
                    ),
                    act
                      ? h("button",{onClick:()=>clockOut(act.id),style:{flexShrink:0,borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:700,border:"1px solid "+emp.color+"88",background:emp.color+"33",color:emp.color,padding:"5px 8px"}},"Out")
                      : h("button",{onClick:()=>clockIn(emp.id,proj.id),style:{flexShrink:0,borderRadius:7,cursor:"pointer",fontSize:11,fontWeight:700,border:"1px solid "+emp.color+"44",background:emp.color+"12",color:emp.color,padding:"5px 8px"}},"In")
                  )
                );
              })
            )
          );
        })
      ),

      emps.length===0&&h("div",{style:{fontSize:13,color:T.dim,textAlign:"center",padding:48}},"No crew set up yet.")
    ),

    // ═══ ADMIN VIEW ═══
    mode==="admin"&&h("div",null,
      // Admin tabs
      h("div",{style:{background:T.surf,borderBottom:"1px solid "+T.border,display:"flex",padding:"0 16px"}},
        [["projects","Projects"],["crew","Crew"],["log","Log"]].map(([t,l])=>
          h("button",{key:t,onClick:()=>setAdminTab(t),style:{background:"none",border:"none",borderBottom:adminTab===t?"2px solid "+T.text:"2px solid transparent",color:adminTab===t?T.text:T.sub,padding:"12px 16px",cursor:"pointer",fontSize:13,fontWeight:adminTab===t?700:500,marginBottom:-1}},l)
        )
      ),
      // Stats
      h("div",{style:{background:T.surf,borderBottom:"1px solid "+T.border,padding:"10px 20px",display:"flex",gap:24}},
        [{l:"On Clock",v:active.length,c:T.green},{l:"Active Jobs",v:activeProjs.length,c:T.amber},{l:"Total Hours",v:fmtHrs(totalMs),c:T.blue}].map(s=>
          h("div",{key:s.l,style:{display:"flex",alignItems:"baseline",gap:6}},
            h("span",{style:{fontSize:18,fontWeight:700,color:s.c}},s.v),
            h("span",{style:{fontSize:11,color:T.dim}},s.l)
          )
        )
      ),

      h("div",{style:{padding:"16px 16px 80px",maxWidth:680,margin:"0 auto"}},

        // PROJECTS TAB
        adminTab==="projects"&&h("div",null,
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
            h("span",{style:{fontSize:13,color:T.sub}},projs.length+" project"+(projs.length!==1?"s":"")),
            h("div",{style:{display:"flex",gap:8}},
              h(Btn,{label:"+ Log Hours",size:"sm",variant:"ghost",onClick:()=>{setLf({empId:"",projId:"",hours:"",date:new Date().toISOString().slice(0,10)});setLogSheet({});}}),
              h(Btn,{label:"+ Project",size:"sm",onClick:()=>{setPf({name:"",client:"",status:"Not Started",deadline:"",assignedTo:[]});setEditingProj("new");}})
            )
          ),
          // Status filter pills
          h("div",{style:{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}},
            ["All",...STATUSES].map(s=>{
              const count=s==="All"?projs.length:projs.filter(p=>p.status===s).length;
              const active=projFilter===s;
              const color=s==="All"?T.text:SC[s]||T.text;
              return h("button",{key:s,onClick:()=>setProjFilter(s),style:{
                background:active?(s==="All"?T.text:color+"18"):T.faint,
                color:active?(s==="All"?"#FFF":color):T.sub,
                border:"1px solid "+(active?(s==="All"?T.text:color+"66"):T.border),
                borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:active?700:400,
                cursor:"pointer",whiteSpace:"nowrap"
              }},s+(count>0?" ("+count+")":""));
            })
          ),

          // Inline new project form
          editingProj==="new"&&h("div",{style:{...card,marginBottom:12,padding:16,background:"#F0FDF4",border:"1.5px solid #BBF7D0"}},
            h("div",{style:{fontSize:12,fontWeight:700,color:T.green,marginBottom:12}},"NEW PROJECT"),
            h(Field,{label:"Project Name",value:pf.name,onChange:v=>setPf({...pf,name:v})}),
            h(Field,{label:"Client",value:pf.client,onChange:v=>setPf({...pf,client:v})}),
            h(Field,{label:"Status",value:pf.status,onChange:v=>setPf({...pf,status:v}),options:STATUSES}),
            h(Field,{label:"Deadline",value:pf.deadline,onChange:v=>setPf({...pf,deadline:v}),type:"date"}),
            h("div",{style:{marginBottom:14}},
              h("div",{style:{fontSize:11,fontWeight:600,color:T.sub,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}},"Assign Crew"),
              h("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
                emps.map(e=>{ const sel=pf.assignedTo.includes(e.id);

              )
            ),
            h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
              h(Btn,{label:"Cancel",variant:"ghost",onClick:()=>setEditingProj(null)}),
              h(Btn,{label:"✓ Add Project",onClick:()=>{if(!pf.name.trim())return;setProjs(p=>[...p,{id:Date.now(),...pf}]);setEditingProj(null);}})

          ...(projFilter==="All"?projs:projs.filter(p=>p.status===projFilter)).map(proj=>{

            const projDone=done.filter(e=>e.projId===proj.id).sort((a,b)=>b.start-a.start);
            return h("div",{key:proj.id,style:{...card,marginBottom:8}},

              // Inline edit form
              isEditing
                ? h("div",{style:{padding:16}},
                    h("div",{style:{fontSize:12,fontWeight:700,color:T.amber,marginBottom:12}},"EDIT PROJECT"),
                    h(Field,{label:"Project Name",value:pf.name,onChange:v=>setPf({...pf,name:v})}),
                    h(Field,{label:"Client",value:pf.client,onChange:v=>setPf({...pf,client:v})}),
                    h(Field,{label:"Status",value:pf.status,onChange:v=>setPf({...pf,status:v}),options:STATUSES}),
                    h(Field,{label:"Deadline",value:pf.deadline,onChange:v=>setPf({...pf,deadline:v}),type:"date"}),
                    h("div",{style:{marginBottom:14}},
                      h("div",{style:{fontSize:11,fontWeight:600,color:T.sub,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:8}},"Assign Crew"),

      h("div",{style:{marginBottom:14}},
        h("div",{style:{fontSize:11,fontWeight:600,color:T.sub,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:5}},"Employee"),
        h("select",{value:lf.empId,onChange:e=>setLf({...lf,empId:e.target.value}),style:{width:"100%",background:T.faint,border:"1px solid "+T.border,borderRadius:8,color:T.text,padding:"10px 12px",fontSize:14,boxSizing:"border-box",outline:"none",appearance:"none"}},
          h("option",{value:""},"Select employee…"),
          emps.map(e=>h("option",{key:e.id,value:e.id},e.name))
        )
      ),
      h("div",{style:{marginBottom:14}},
        h("div",{style:{fontSize:11,fontWeight:600,color:T.sub,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:5}},"Project"),
        h("select",{value:lf.projId,onChange:e=>setLf({...lf,projId:e.target.value}),style:{width:"100%",background:T.faint,border:"1px solid "+T.border,borderRadius:8,color:T.text,padding:"10px 12px",fontSize:14,boxSizing:"border-box",outline:"none",appearance:"none"}},
          h("option",{value:""},"Select project…"),
          projs.map(p=>h("option",{key:p.id,value:p.id},p.name))
        )
      ),
      h(Field,{label:"Hours worked (e.g. 3.5)",value:lf.hours,onChange:v=>setLf({...lf,hours:v})}),
      h(Field,{label:"Date",value:lf.date,onChange:v=>setLf({...lf,date:v}),type:"date"}),
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h(Btn,{label:"Cancel",variant:"ghost",onClick:()=>setLogSheet(null)}),
        h(Btn,{label:"Save Entry",onClick:saveLog})
      )
    ),

    importSheet&&h(ImportSheet,{
      emps,projs,
      onClose:()=>setImportSheet(false),
      onSave:(newEntries)=>{setEntries(p=>[...p,...newEntries]);setImportSheet(false);}
    }),

    confirmEntry&&h(Confirm,{entry:confirmEntry,emps,projs,onConfirm:()=>deleteEntry(confirmEntry.id),onCancel:()=>setConfirmEntry(null)})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
