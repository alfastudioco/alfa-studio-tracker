async function dbLoad(table) {
  try {
    const r = await fetch(SB_URL+"/rest/v1/"+table+"?select=*&order=id", {
      method: "GET",
      mode: "cors",
      headers: SB_HEADERS
    });
    if (!r.ok) { console.error("dbLoad failed", table, r.status); return null; }
    const rows = await r.json();
    if (!Array.isArray(rows) || rows.length===0) return null;
    return rows.map(row => row.data);
  } catch(e) { console.error("dbLoad error", table, e.message); return null; }
}

async function dbSave(table, items) {
  try {
    if (!items || items.length === 0) return;
    const body = items.map(item => ({id: String(item.id), data: item}));
    const r = await fetch(SB_URL+"/rest/v1/"+table, {
      method: "POST",
      mode: "cors",
      headers: {...SB_HEADERS, "Prefer": "resolution=merge-duplicates,return=minimal"},
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      const txt = await r.text();
      console.error("dbSave failed", table, r.status, txt);
    }
  } catch(e) { console.error("dbSave error", table, e.message); }
}

async function dbDelete(table, keepIds) {
  try {
    if (!keepIds || keepIds.length === 0) return;
    const ids = keepIds.map(i => String(i)).join(",");
    await fetch(SB_URL+"/rest/v1/"+table+"?id=not.in.("+ids+")", {
      method: "DELETE", mode: "cors", headers: SB_HEADERS
    });
  } catch(e) { console.error("dbDelete error", table, e.message); }
}

async function dbPushAll(emps, projs, entries) {
  await Promise.all([
    dbSave("employees", emps),
    dbSave("projects",  projs),
    dbSave("entries",   entries),
    dbDelete("employees", emps.map(x=>String(x.id))),
    dbDelete("projects",  projs.map(x=>String(x.id))),
    dbDelete("entries",   entries.map(x=>String(x.id))),

}

//  -- Helpers ------------------------------------------------
function fmtHrs(ms){
  const h=ms/3600000;
  if(h<0.017)return"—";
  if(h<1)return Math.round(h*60)+"m";
  const hrs=Math.floor(h),mins=Math.round((h-hrs)*60);
  return mins>0?`${hrs}h ${mins}m`:`${hrs}h`;
}
function fmtTime(ms){return new Date(ms).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});}
function fmtDate(ms){return new Date(ms).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});}
function dayKey(ms){const d=new Date(ms);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function dayLabel(key){
  const tk=dayKey(Date.now()),yk=dayKey(Date.now()-86400000);
  if(key===tk)return"Today"; if(key===yk)return"Yesterday";
  const[y,m,d]=key.split("-").map(Number);
  return new Date(y,m-1,d).toLocaleDateString([],{weekday:"short",month:"short",day:"numeric"});
}

//  -- PinScreen ----------------------------------------------
function PinScreen({onSuccess,onCancel}){
  const [pin,setPin]=useState("");
  const [error,setError]=useState(false);

  function press(k){
    if(k==="⌫"){setPin(p=>p.slice(0,-1));setError(false);return;}
    const next=pin+k;
    setPin(next);setError(false);
    if(next.length===4){
      const user=ADMIN_USERS.find(u=>u.pin===next);
      if(user){onSuccess(user);}
      else{setError(true);setTimeout(()=>{setPin("");setError(false);},600);}
    }
  }

  // Keyboard support
  useEffect(()=>{
    function onKey(e){
      if(e.key>="0"&&e.key<="9") press(e.key);
      else if(e.key==="Backspace") press("⌫");
      else if(e.key==="Escape") onCancel();
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[pin]);

  return h("div",{style:{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24}},
    h("div",{style:{background:T.surf,borderRadius:20,padding:"32px 28px",width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.1)",textAlign:"center"}},

      h("div",{style:{display:"flex",justifyContent:"center",gap:12,marginBottom:28}},

          h("button",{key:i,onClick:()=>k!==""&&press(String(k)),style:{

//  -- WorkerLogCard ------------------------------------------
function WorkerLogCard({emp,entries,projs,onDelete}){
  const [open,setOpen]=useState({});
  const toggle=pid=>setOpen(p=>({...p,[pid]:!p[pid]}));
  const projMap={};
  entries.filter(e=>e.end).forEach(e=>{
    if(!projMap[e.projId])projMap[e.projId]={ms:0,items:[]};
    projMap[e.projId].ms+=(e.end-e.start);
    projMap[e.projId].items.push(e);
  });
  const groups=Object.entries(projMap).map(([pid,pg])=>({
    pid:+pid,proj:projs.find(x=>x.id===+pid),ms:pg.ms,
    items:pg.items.sort((a,b)=>b.start-a.start),
  })).sort((a,b)=>b.ms-a.ms);
  const total=groups.reduce((s,g)=>s+g.ms,0);

  return h("div",{style:{background:T.surf,border:"1px solid "+T.border,borderRadius:12,marginBottom:12,overflow:"hidden"}},
    h("div",{style:{padding:"14px 16px",borderBottom:"1px solid "+T.line,display:"flex",alignItems:"center",gap:10}},
      h("div",{style:{width:10,height:10,borderRadius:"50%",background:emp.color,flexShrink:0}}),
      h("span",{style:{fontWeight:700,fontSize:14,flex:1,color:T.text}},emp.name),
      h("span",{style:{fontSize:12,color:T.sub}},emp.role),
      h("span",{style:{fontSize:14,fontWeight:700,color:T.amber,marginLeft:8}},fmtHrs(total))
    ),
    h("div",{style:{padding:"10px 16px"}},
      groups.map(g=>{
        const isOpen=!!open[g.pid];
        const pColor=g.proj?SC[g.proj.status]||T.dim:T.dim;
        return h("div",{key:g.pid,style:{marginBottom:4}},
          h("div",{onClick:()=>toggle(g.pid),style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.faint,borderRadius:8,cursor:"pointer",borderLeft:"3px solid "+pColor}},
            h("span",{style:{flex:1,fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},g.proj?.name||"Unknown"),
            h("span",{style:{fontSize:13,fontWeight:700,color:T.amber}},fmtHrs(g.ms)),
            h("span",{style:{fontSize:11,color:T.dim,marginLeft:2}},isOpen?"▲":"▼")
          ),
          isOpen&&h("div",{style:{paddingLeft:12,paddingTop:3}},
            g.items.map(e=>h("div",{key:e.id,style:{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderBottom:"1px solid "+T.line}},
              h("span",{style:{fontSize:12,color:T.sub,minWidth:90,flexShrink:0}},fmtDate(e.start)),
              h("span",{style:{fontSize:11,color:T.dim,flexShrink:0}},fmtTime(e.start)+"–"+fmtTime(e.end)),
              h("span",{style:{flex:1}}),
              h("span",{style:{fontSize:13,fontWeight:600,color:T.text}},fmtHrs(e.end-e.start)),
              h("button",{onClick:ev=>{ev.stopPropagation();onDelete(e);},style:{background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:16,padding:"0 2px",lineHeight:1}},"×")
            ))
          )
        );
      })
    )
  );
}

function ImportSheet({emps, projs, onClose, onSave}) {
  const [step, setStep] = useState("paste"); // "paste" | "review"
  const [raw, setRaw] = useState("");
  const [rows, setRows] = useState([]);
  const [parseError, setParseError] = useState("");

  const selStyle = {width:"100%",background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:6,color:"#1C1917",padding:"8px 10px",fontSize:13,outline:"none",appearance:"none"};
  const lbl = txt => h("div",{style:{fontSize:10,fontWeight:600,color:"#78716C",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}},txt);

  function parseRaw() {
    setParseError("");
    const lines = raw.trim().split("\n").filter(l=>l.trim());
    if (!lines.length) { setParseError("Nothing to parse."); return; }
    const parsed = lines.map((line,i) => {
      // split by tab (Excel) or comma
      const cols = line.includes("\t") ? line.split("\t") : line.split(",");
      const [empCol="", projCol="", dateCol="", hoursCol=""] = cols.map(c=>c.trim().replace(/^"|"$/g,""));
      // Try to match employee by name (case insensitive partial)
      const emp = emps.find(e=>e.name.toLowerCase().includes(empCol.toLowerCase())) || null;
      const proj = projs.find(p=>p.name.toLowerCase().includes(projCol.toLowerCase())) || null;
      // Parse date — try various formats
      let dateVal = "";
      if (dateCol) {
        const d = new Date(dateCol);
        if (!isNaN(d)) dateVal = d.toISOString().slice(0,10);
        else dateVal = new Date().toISOString().slice(0,10);
      } else {
        dateVal = new Date().toISOString().slice(0,10);
      }
      const hours = parseFloat(hoursCol) || "";
      return { id: Date.now()+i+Math.random(), empId: emp?String(emp.id):"", projId: proj?String(proj.id):"", date: dateVal, hours: String(hours), rawEmp: empCol, rawProj: projCol };
    });
    setRows(parsed);
    setStep("review");
  }

  function updateRow(id, field, val) {
    setRows(p=>p.map(r=>r.id===id?{...r,[field]:val}:r));
  }

  const valid = rows.filter(r=>r.empId&&r.projId&&r.hours&&+r.hours>0);

  function doImport() {
    const entries = valid.map(r=>{
      const ms=+r.hours*3600000;
      const base=new Date(r.date+"T07:00:00").getTime();
      return {id:Date.now()+Math.floor(Math.random()*1000),empId:+r.empId,projId:+r.projId,start:base,end:base+ms};
    });
    onSave(entries);
  }

  return h(Sheet,{title:"Import from Spreadsheet",onClose},

    // STEP 1 — Paste
    step==="paste"&&h("div",null,
      h("div",{style:{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#166534",lineHeight:1.7}},
        h("strong",null,"How to paste from Excel:"),h("br"),
        "1. In Excel, select columns in this order:",h("br"),
        h("code",{style:{background:"#DCFCE7",padding:"1px 5px",borderRadius:3,fontSize:11}},"Employee  |  Project  |  Date  |  Hours"),h("br"),
        "2. Copy (Ctrl+C / Cmd+C)",h("br"),
        "3. Paste below (Ctrl+V / Cmd+V)",h("br"),
        h("span",{style:{color:"#14532D",fontSize:11}},"Employee & project names are matched automatically. You can fix any mismatches on the next screen.")
      ),
      h("textarea",{
        value:raw,
        onChange:e=>setRaw(e.target.value),
        placeholder:"Paste your spreadsheet data here…",
        style:{width:"100%",minHeight:160,background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:8,color:"#1C1917",padding:"10px 12px",fontSize:13,outline:"none",resize:"vertical",fontFamily:"monospace",boxSizing:"border-box",marginBottom:8}
      }),
      parseError&&h("div",{style:{fontSize:12,color:"#DC2626",marginBottom:8}},parseError),
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h(Btn,{label:"Cancel",variant:"ghost",onClick:onClose}),
        h("button",{onClick:parseRaw,style:{background:"#1C1917",color:"#FFF",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}},
          "Preview →")
      )
    ),

    // STEP 2 — Review & fix
    step==="review"&&h("div",null,
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("span",{style:{fontSize:12,color:"#78716C"}},"Review "+rows.length+" row"+(rows.length!==1?"s":"")+". Fix any mismatches below."),
        h("button",{onClick:()=>setStep("paste"),style:{background:"none",border:"none",color:"#78716C",fontSize:12,cursor:"pointer",textDecoration:"underline"}},"← Back")

          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},

            h("div",null,
              lbl("Employee"+(row.rawEmp&&!row.empId?" (not matched)":"")),
              h("select",{value:row.empId,onChange:e=>updateRow(row.id,"empId",e.target.value),style:{...selStyle,borderColor:!row.empId?"#FCA5A5":"#E5E2DC"}},
                h("option",{value:""},"Select…"),
                emps.map(e=>h("option",{key:e.id,value:e.id},e.name))
              )
            ),
            h("div",null,
              lbl("Project"+(row.rawProj&&!row.projId?" (not matched)":"")),
              h("select",{value:row.projId,onChange:e=>updateRow(row.id,"projId",e.target.value),style:{...selStyle,borderColor:!row.projId?"#FCA5A5":"#E5E2DC"}},
                h("option",{value:""},"Select…"),
                projs.map(p=>h("option",{key:p.id,value:p.id},p.name))
              )
            ),
            h("div",null,
              lbl("Date"),
              h("input",{type:"date",value:row.date,onChange:e=>updateRow(row.id,"date",e.target.value),style:selStyle})
            ),
            h("div",null,
              lbl("Hours"),
              h("input",{type:"number",min:0,step:0.5,value:row.hours,onChange:e=>updateRow(row.id,"hours",e.target.value),style:{...selStyle,borderColor:(!row.hours||+row.hours<=0)?"#FCA5A5":"#E5E2DC"}})
            )
          )
        );
      }),

      h("div",{style:{background:"#F5F3F0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#78716C",display:"flex",justifyContent:"space-between"}},
        h("span",null,valid.length+" of "+rows.length+" rows ready"),
        rows.length!==valid.length&&h("span",{style:{color:"#D97706"}},(rows.length-valid.length)+" with issues will be skipped")
      ),
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        h(Btn,{label:"Cancel",variant:"ghost",onClick:onClose}),
        h("button",{
          onClick:doImport,
          disabled:!valid.length,
          style:{background:valid.length?"#1C1917":"#E5E2DC",color:valid.length?"#FFF":"#A8A29E",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:valid.length?"pointer":"default"}
        },"✓ Import "+valid.length+" Entr"+(valid.length!==1?"ies":"y"))
      )
    )
  );
}



//  -- CogsVendorList --
function CogsVendorList({items, onEdit, onDelete}) {
  const [openVendor, setOpenVendor] = React.useState(null);

  // Group by vendor
  const groups = {};
  [...items].sort((a,b)=>b.date.localeCompare(a.date)).forEach(i=>{
    const key = (i.vendor&&i.vendor.trim()) ? i.vendor.trim() : "No Vendor";
    if(!groups[key]) groups[key] = [];
    groups[key].push(i);
  });
  const sorted = Object.entries(groups).sort((a,b)=>
    b[1].reduce((s,i)=>s+(+i.amount||0),0) - a[1].reduce((s,i)=>s+(+i.amount||0),0)
  );

  return h("div",null,
    sorted.map(([vendor, vendorItems])=>{
      const total = vendorItems.reduce((s,i)=>s+(+i.amount||0),0);
      const isOpen = openVendor===vendor;
      return h("div",{key:vendor,style:{marginBottom:6,borderRadius:8,border:"1px solid #E5E2DC",overflow:"hidden"}},
        // Vendor header row
        h("div",{onClick:()=>setOpenVendor(isOpen?null:vendor),
          style:{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",cursor:"pointer",
                 background:isOpen?"#F5F3F0":"#FFF"}},
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:13,fontWeight:700,color:"#1C1917"}},vendor),
            h("div",{style:{fontSize:11,color:"#A8A29E"}},vendorItems.length+" item"+(vendorItems.length!==1?"s":""))
          ),
          h("span",{style:{fontSize:14,fontWeight:700,color:"#2563EB",flexShrink:0}},"$"+total.toFixed(2)),
          h("span",{style:{fontSize:11,color:"#A8A29E",marginLeft:6}},isOpen?"▲":"▼")
        ),
        // Line items
        isOpen&&h("div",{style:{borderTop:"1px solid #F0EDE8"}},
          vendorItems.map(item=>
            h("div",{key:item.id,style:{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid #F0EDE8",background:"#FAFAF9"}},
              h("div",{style:{flex:1,minWidth:0}},
                h("div",{style:{fontSize:12,fontWeight:600,color:"#1C1917",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},item.desc||item.category),
                h("div",{style:{fontSize:11,color:"#A8A29E"}},
                  (item.invoiceNo?"#"+item.invoiceNo+" · ":"")+item.date
                )
              ),
              h("span",{style:{fontSize:13,fontWeight:700,color:"#2563EB",flexShrink:0}},"$"+Number(item.amount).toFixed(2)),
              h("button",{onClick:()=>onEdit(item),style:{background:"none",border:"none",color:"#A8A29E",cursor:"pointer",fontSize:13,padding:"0 4px",flexShrink:0}},"✏"),
              h("button",{onClick:()=>onDelete(item),style:{background:"none",border:"none",color:"#D1C9C0",cursor:"pointer",fontSize:15,padding:"0 2px",flexShrink:0}},"×")
            )
          )
        )
      );
    })
  );
}

//  -- CogsSheet ----------------------------------------------
function CogsSheet({projId, proj, cogs, setCogs, vendors, onClose, onBudgetChange, onAddVendor}) {
  const items = cogs[projId] || [];
  const today = new Date().toISOString().slice(0,10);
  const blank = {desc:"", amount:"", vendor:"", date:today, invoiceNo:""};
  const [form, setForm] = React.useState(blank);
  const [editId, setEditId] = React.useState(null);
  const [quickVendor, setQuickVendor] = React.useState("");
  const [showQuickVendor, setShowQuickVendor] = React.useState(false);
  const [scanning, setScanning] = React.useState(false);
  const [confirmCogs, setConfirmCogs] = React.useState(null); // item to delete
  const [scanPreview, setScanPreview] = React.useState(null); // base64 image
  const [scanError, setScanError] = React.useState("");

  async function handleInvoiceUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    setScanning(true); setScanError(""); setScanPreview(null);
    try {
      const isPDF = file.type === "application/pdf";

      // For PDFs: render first page to canvas, then use as image
      // For images: read directly
      let base64, mediaType;

      if (isPDF) {
        // Use PDF.js to render the first page as an image
        const pdfjsLib = window.pdfjsLib;
        if (!pdfjsLib) throw new Error("PDF reader not loaded");

        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({scale: 2.0});
        const canvas = document.createElement("canvas");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({canvasContext: canvas.getContext("2d"), viewport}).promise;
        base64 = canvas.toDataURL("image/jpeg", 0.9).split(",")[1];
        mediaType = "image/jpeg";
        setScanPreview("data:image/jpeg;base64," + base64);
      } else {
        // Compress image before sending — mobile photos can be 5-10MB
        const compressed = await new Promise((res,rej) => {
          const img = new Image();
          const url = URL.createObjectURL(file);
          img.onload = () => {
            // Scale down to max 1200px on longest side
            const maxSize = 1200;
            let w = img.width, h = img.height;
            if (w > maxSize || h > maxSize) {
              if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
              else { w = Math.round(w * maxSize / h); h = maxSize; }
            }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            res(canvas.toDataURL("image/jpeg", 0.85).split(",")[1]);
          };
          img.onerror = rej;
          img.src = url;
        });
        base64 = compressed;
        mediaType = "image/jpeg";
        setScanPreview("data:image/jpeg;base64," + base64);
      }

      // Call Claude API to extract invoice data
      const _p = ["sk-ant-","api03-lseec4PTi7dp","BIK1iN3rrsrlEfqKXW3","c0X0_RcPYM8zL56LJTs","W05lb-lMIwuU2GAmqUs","8Gz2qtSgCDzeb164w-2","_u9LQAA"].join("");
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": _p,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 500,
          messages: [{
            role: "user",
            content: [
              {type:"image", source:{type:"base64", media_type:mediaType, data:base64}},
              {type:"text", text:"Extract from this vendor invoice and return ONLY valid JSON with keys: vendor, amount (number), date (YYYY-MM-DD), description (max 60 chars), invoiceNo (invoice/reference number as string). Use null for missing fields."}
            ]
          }]
        })
      });
      if (!response.ok) {
        const errText = await response.text();
        console.error("Claude API error:", response.status, errText);
        throw new Error("API error "+response.status+": "+errText.slice(0,120));
      }
      const data = await response.json();
      console.log("Claude response:", data);
      const text = data.content && data.content[0] && data.content[0].text;
      if (!text) throw new Error("No response from AI. Full response: "+JSON.stringify(data));
      let parsed;
      try { parsed = JSON.parse(text.replace(/```json|```/g,"").trim()); }
      catch(pe) { throw new Error("Could not parse AI response: "+text.slice(0,100)); }

      // Check for duplicate invoice number across all cogs entries
      if (parsed.invoiceNo) {
        const invLow = parsed.invoiceNo.toLowerCase().trim();
        const allItems = Object.values(cogs).flat();
        const dup = allItems.find(i => i.invoiceNo && i.invoiceNo.toLowerCase().trim()===invLow);
        if (dup) {
          setScanError("⚠ Invoice #"+parsed.invoiceNo+" already exists. Duplicate blocked.");
          setScanning(false);
          return;
        }
      }

      // Pre-fill form with extracted data
      // Match vendor name against existing vendors (partial match)
      let vendorName = parsed.vendor||"";
      if(vendorName) {
        const vLow = vendorName.toLowerCase().trim();
        const match = vendors.find(v=>{ const eLow=v.name.toLowerCase().trim(); return eLow===vLow||eLow.includes(vLow)||vLow.includes(eLow); });
        if(match) vendorName = match.name;
      }
      setForm(f => ({
        ...f,
        vendor:    vendorName         || f.vendor,
        amount:    parsed.amount      ? String(parsed.amount) : f.amount,
        date:      parsed.date        || f.date,
        desc:      parsed.description || f.desc,
        invoiceNo: parsed.invoiceNo   || f.invoiceNo,
      }));

      // Auto-add vendor if new — use partial match to avoid duplicates
      if (parsed.vendor) {
        const vLow = parsed.vendor.toLowerCase().trim();
        const existing = vendors.find(v=>{
          const eLow = v.name.toLowerCase().trim();
          return eLow===vLow || eLow.includes(vLow) || vLow.includes(eLow);
        });
        if (!existing) {
          onAddVendor && onAddVendor(parsed.vendor.trim());
        } else {
          // Use the existing vendor name in the form instead of AI-returned name
          setForm(f=>({...f, vendor: existing.name}));
        }
      }
    } catch(err) {
      setScanError("Could not read: "+(err.message||"unknown error")+". Please fill in manually.");
      console.error("Invoice scan error:", err);
    }
    setScanning(false);
  }

  const total = items.reduce((s,i)=>s+(+i.amount||0),0);
  const budget = proj.budget || 0;
  const pct = budget>0 ? Math.min(100, total/budget*100) : 0;
  const barColor = total>budget ? "#EF4444" : pct>80 ? "#F59E0B" : "#34D399";

  const inp = {background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:8,color:"#1C1917",padding:"9px 11px",fontSize:13,outline:"none",boxSizing:"border-box",width:"100%"};
  const lbl = txt => h("div",{style:{fontSize:10,fontWeight:600,color:"#78716C",textTransform:"uppercase",letterSpacing:"0.04em",marginBottom:4}},txt);

  function save() {
    if(!form.desc.trim()||!form.amount||isNaN(+form.amount)||+form.amount<=0) return;
    const item = {id:editId||Date.now(), desc:form.desc, amount:+form.amount, vendor:form.vendor, date:form.date, invoiceNo:form.invoiceNo||""};
    setCogs(p=>({...p,[projId]: editId
      ? (p[projId]||[]).map(i=>i.id===editId?item:i)
      : [...(p[projId]||[]), item]
    }));
    setForm(blank); setEditId(null);
  }
  function del(id){ setCogs(p=>({...p,[projId]:(p[projId]||[]).filter(i=>i.id!==id)})); setConfirmCogs(null); }
  function edit(item){ setForm({desc:item.desc,amount:String(item.amount),vendor:item.vendor||"",date:item.date,invoiceNo:item.invoiceNo||""}); setEditId(item.id); }
  function addQuickVendor(){
    if(!quickVendor.trim()) return;
    const name=quickVendor.trim();
    onAddVendor&&onAddVendor(name);
    setForm(f=>({...f,vendor:name}));
    setQuickVendor(""); setShowQuickVendor(false);
  }

  // Category totals
  const byCat={};
  items.forEach(i=>{ byCat[i.category]=(byCat[i.category]||0)+(+i.amount||0); });

  return h(Sheet,{title:"Costs — "+proj.name, onClose},

    //  -- Summary card --
    h("div",{style:{background:"#1C1917",borderRadius:12,padding:"14px 16px",marginBottom:14}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:budget>0?8:0}},
        h("span",{style:{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.5)",letterSpacing:"0.06em",textTransform:"uppercase"}},"Total Cost"),
        h("div",{style:{display:"flex",alignItems:"baseline",gap:10}},
          h("span",{style:{fontSize:20,fontWeight:800,color:"#60A5FA"}},"$"+total.toFixed(2)),
          budget>0&&h("span",{style:{fontSize:11,color:"rgba(255,255,255,0.35)"}},"/ $"+budget.toFixed(2))
        )
      ),
      budget>0&&h("div",null,
        h("div",{style:{background:"rgba(255,255,255,0.1)",borderRadius:4,height:5,marginBottom:4}},
          h("div",{style:{background:barColor,borderRadius:4,height:5,width:pct+"%",transition:"width .4s"}})
        ),
        h("div",{style:{display:"flex",justifyContent:"space-between"}},
          h("span",{style:{fontSize:10,color:"rgba(255,255,255,0.35)"}},Math.round(pct)+"% used"),
          h("span",{style:{fontSize:10,color:total>budget?"#FCA5A5":"rgba(255,255,255,0.35)"}},
            total>budget?"$"+(total-budget).toFixed(2)+" over":"$"+(budget-total).toFixed(2)+" left"
          )
        )
      ),
      Object.keys(byCat).length>0&&h("div",{style:{marginTop:10,display:"flex",gap:10,flexWrap:"wrap"}},
        Object.entries(byCat).map(([c,a])=>h("span",{key:c,style:{fontSize:11,color:"rgba(255,255,255,0.45)"}},"● "+c+": $"+a.toFixed(2)))
      )
    ),

    //  -- Budget input --
    h("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:16,background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:8,padding:"8px 12px"}},
      h("span",{style:{fontSize:12,color:"#78716C",whiteSpace:"nowrap"}},"Project budget"),
      h("span",{style:{fontSize:13,color:"#78716C"}},"$"),
      h("input",{type:"number",min:0,step:10,value:proj.budget||"",placeholder:"0.00",
        onChange:e=>onBudgetChange(+e.target.value||0),
        style:{flex:1,background:"transparent",border:"none",color:"#1C1917",fontSize:14,fontWeight:600,outline:"none"}
      })
    ),

    //  -- Invoice scanner --
    !editId&&h("div",{style:{marginBottom:12}},
      scanning
        ? h("div",{style:{background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:"16px",textAlign:"center"}},
            h("div",{style:{fontSize:13,color:"#3B82F6",fontWeight:600}},"⟳ Reading invoice with AI…"),
            h("div",{style:{fontSize:11,color:"#93C5FD",marginTop:4}},"This may take a few seconds")
          )
        : h("div",{style:{display:"flex",gap:8}},
            h("label",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:"14px 8px",cursor:"pointer",textAlign:"center"}},
              h("input",{type:"file",accept:"image/*",capture:"environment",onChange:handleInvoiceUpload,style:{display:"none"}}),
              h("div",{style:{fontSize:22}},"📷"),
              h("div",{style:{fontSize:12,fontWeight:600,color:"#3B82F6"}},"Take Photo"),
              h("div",{style:{fontSize:10,color:"#93C5FD"}},"Camera")
            ),
            h("label",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:"14px 8px",cursor:"pointer",textAlign:"center"}},
              h("input",{type:"file",accept:"image/*,application/pdf",onChange:handleInvoiceUpload,style:{display:"none"}}),
              h("div",{style:{fontSize:22}},"📄"),
              h("div",{style:{fontSize:12,fontWeight:600,color:"#3B82F6"}},"Choose File"),
              h("div",{style:{fontSize:10,color:"#93C5FD"}},"PDF or Image")
            )
          ),
      scanError&&h("div",{style:{fontSize:11,color:"#EF4444",marginTop:6,textAlign:"center"}},scanError),
      scanPreview&&h("div",{style:{marginTop:8,borderRadius:8,overflow:"hidden",maxHeight:120,textAlign:"center"}},
        h("img",{src:scanPreview,style:{maxHeight:120,maxWidth:"100%",borderRadius:8,objectFit:"contain"}})
      )
    ),

    //  -- Add / Edit form --
    h("div",{style:{background:editId?"#FFFBEB":"#F8F7F4",border:"1.5px solid "+(editId?"#FDE68A":"#E5E2DC"),borderRadius:10,padding:"12px",marginBottom:14}},
      h("div",{style:{fontSize:11,fontWeight:700,color:editId?"#D97706":"#1C1917",marginBottom:10,letterSpacing:"0.04em"}},editId?"✏ EDIT ENTRY":"+ NEW ENTRY"),

      // Amount
      h("div",{style:{marginBottom:8}},
        lbl("Amount ($)"),
        h("input",{type:"number",min:0,step:0.01,placeholder:"0.00",value:form.amount,onChange:e=>setForm(f=>({...f,amount:e.target.value})),style:inp})
      ),

      // Row 2: Description
      h("div",{style:{marginBottom:8}},
        lbl("Description"),
        h("input",{type:"text",placeholder:"e.g. Oak lumber 50 board ft",value:form.desc,onChange:e=>setForm(f=>({...f,desc:e.target.value})),style:inp})
      ),

      // Invoice number field
      h("div",{style:{marginBottom:8}},
        lbl("Invoice #"),
        h("input",{type:"text",placeholder:"e.g. INV-1042",value:form.invoiceNo,onChange:e=>setForm(f=>({...f,invoiceNo:e.target.value})),style:inp})
      ),

      // Row 3: Vendor + Date
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}},
        h("div",null,
          lbl("Vendor"),
          h("div",{style:{position:"relative"}},
            h("select",{value:form.vendor,onChange:e=>{ if(e.target.value==="__new__"){setShowQuickVendor(true);}else{setForm(f=>({...f,vendor:e.target.value}));} },style:{...inp,appearance:"none"}},
              h("option",{value:""},"No vendor"),
              vendors.map(v=>h("option",{key:v.id,value:v.name},v.name)),
              h("option",{value:"__new__"},"+ Add vendor…")
            )
          ),
          // Quick-add vendor inline
          showQuickVendor&&h("div",{style:{display:"flex",gap:6,marginTop:6}},
            h("input",{type:"text",placeholder:"Vendor name",value:quickVendor,onChange:e=>setQuickVendor(e.target.value),style:{...inp,flex:1}}),
            h("button",{onClick:addQuickVendor,style:{background:"#1C1917",color:"#FFF",border:"none",borderRadius:6,padding:"0 12px",cursor:"pointer",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}},"Add"),
            h("button",{onClick:()=>{setShowQuickVendor(false);setQuickVendor("");},style:{background:"none",border:"1px solid #E5E2DC",borderRadius:6,padding:"0 10px",cursor:"pointer",fontSize:12,color:"#78716C"}},"✕")
          )
        ),
        h("div",null,
          lbl("Date"),
          h("input",{type:"date",value:form.date,onChange:e=>setForm(f=>({...f,date:e.target.value})),style:inp})
        )
      ),

      // Save/cancel
      h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
        editId&&h("button",{onClick:()=>{setEditId(null);setForm(blank);},style:{borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600,padding:"7px 14px",background:"transparent",color:"#78716C",border:"1px solid #E5E2DC"}},"Cancel"),
        h("button",{onClick:save,style:{borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:700,padding:"7px 20px",background:"#1C1917",color:"#FFF",border:"none"}},editId?"✓ Update":"✓ Add")
      )
    ),

    //  -- Items grouped by vendor --
    items.length===0&&h("div",{style:{fontSize:12,color:"#A8A29E",textAlign:"center",padding:24}},"No costs added yet."),
    items.length>0&&h(CogsVendorList,{items,onEdit:edit,onDelete:setConfirmCogs}),

    // Confirm delete dialog
    confirmCogs&&h("div",{onClick:()=>setConfirmCogs(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},

//  -- ProjEmpLog: groups project entries by employee with collapsible rows --
function ProjEmpLog({entries, emps, onDelete}) {
  const [open, setOpen] = React.useState({});
  const toggle = id => setOpen(p=>({...p,[id]:!p[id]}));

  // Group by employee
  const empMap = {};
  entries.forEach(e=>{
    if(!empMap[e.empId]) empMap[e.empId]={ms:0,items:[]};
    empMap[e.empId].ms += (e.end-e.start);
    empMap[e.empId].items.push(e);
  });
  const groups = Object.entries(empMap).map(([eid,g])=>({
    emp: emps.find(x=>x.id===+eid),
    ms: g.ms,
    items: g.items.sort((a,b)=>b.start-a.start),
  })).sort((a,b)=>b.ms-a.ms);

  return h("div",null,
    groups.map(g=>{
      const isOpen = !!open[g.emp&&g.emp.id];
      return h("div",{key:g.emp?.id||"unknown",style:{marginBottom:4}},
        // Employee row — tap to expand
        h("div",{onClick:()=>g.emp&&toggle(g.emp.id),style:{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",background:"#F5F3F0",borderRadius:8,cursor:"pointer",borderLeft:"3px solid "+(g.emp?g.emp.color:"#888")}},
          h("span",{style:{flex:1,fontSize:13,fontWeight:600,color:g.emp?g.emp.color:"#888"}},g.emp?g.emp.name:"Unknown"),
          h("span",{style:{fontSize:13,fontWeight:700,color:"#D97706"}},fmtHrs(g.ms)),
          h("span",{style:{fontSize:11,color:"#A8A29E",marginLeft:4}},isOpen?"▲":"▼")
        ),
        // Expanded individual entries
        isOpen&&h("div",{style:{paddingLeft:10,paddingTop:3}},
          g.items.map(e=>
            h("div",{key:e.id,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderBottom:"1px solid #F0EDE8"}},
              h("span",{style:{fontSize:12,color:"#78716C",minWidth:90,flexShrink:0}},fmtDate(e.start)),
              h("span",{style:{fontSize:11,color:"#A8A29E",flexShrink:0}},fmtTime(e.start)+"–"+fmtTime(e.end)),
              h("span",{style:{flex:1}}),
              h("span",{style:{fontSize:13,fontWeight:600,color:"#1C1917"}},fmtHrs(e.end-e.start)),
              h("button",{onClick:ev=>{ev.stopPropagation();onDelete(e);},style:{background:"none",border:"none",color:"#D1C9C0",cursor:"pointer",fontSize:15,padding:"0 2px",lineHeight:1}},"×")
            )
          )
        )
      );
    })
  );
}



//  -- ProjectDetails --
function ProjectDetails({projId, projDetails, setProjDetails, T, line, faint, secLabel}) {
  const details = projDetails[projId] || {};
  const [tab, setTab] = React.useState("info");
  const [newField, setNewField] = React.useState({name:"",value:""});
  const [addingField, setAddingField] = React.useState(false);

  function set(key, val) {
    setProjDetails(p=>({...p,[projId]:{...p[projId],[key]:val}}));
  }
  function setCustom(idx, field, val) {
    const customs = [...(details.customs||[])];
    customs[idx] = {...customs[idx],[field]:val};
    set("customs", customs);
  }
  function addCustom() {
    if(!newField.name.trim()) return;
    const customs = [...(details.customs||[]), {name:newField.name, value:newField.value}];
    set("customs", customs);
    setNewField({name:"",value:""});
    setAddingField(false);
  }
  function removeCustom(idx) {
    const customs=(details.customs||[]).filter((_,i)=>i!==idx);
    set("customs",customs);
  }

  // File handling — store as base64 in state
  async function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 5*1024*1024) { alert("File too large — max 5MB"); return; }
    const base64 = await new Promise((res,rej)=>{
      const r=new FileReader();
      r.onload=()=>res(r.result);
      r.onerror=rej;
      r.readAsDataURL(file);
    });
    const files=[...(details.files||[]),{id:Date.now(),name:file.name,type:file.type,data:base64,date:new Date().toISOString().slice(0,10)}];
    set("files",files);
    e.target.value="";
  }
  function removeFile(id) {
    set("files",(details.files||[]).filter(f=>f.id!==id));
  }

  const inp = {width:"100%",background:faint,border:"1px solid "+T.border,borderRadius:6,color:T.text,padding:"8px 10px",fontSize:13,outline:"none",boxSizing:"border-box"};
  const lbl = txt => h("div",{style:{fontSize:10,fontWeight:700,color:T.sub,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}},txt);

  const PRESET_FIELDS = [
    {key:"material",    label:"Material / Wood Species"},
    {key:"finish",      label:"Paint / Stain Color"},
    {key:"hardware",    label:"Hardware Selections"},
    {key:"doorProfile", label:"Cabinet Style / Door Profile"},
  ];

  return h("div",{style:{borderTop:"1px solid "+line}},
    // Tab bar
    h("div",{style:{display:"flex",borderBottom:"1px solid "+line}},
      [["info","Client Selections"],["files","Files & Docs"]].map(([t,l])=>
        h("button",{key:t,onClick:()=>setTab(t),style:{flex:1,padding:"10px",background:tab===t?T.surf:"transparent",border:"none",borderBottom:tab===t?"2px solid "+T.text:"2px solid transparent",fontSize:12,fontWeight:tab===t?700:400,color:tab===t?T.text:T.sub,cursor:"pointer"}},l)
      )
    ),

    // INFO TAB
    tab==="info"&&h("div",{style:{padding:"14px 16px"}},
      h("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        // Preset fields
        PRESET_FIELDS.map(({key,label})=>
          h("div",{key},
            lbl(label),
            h("input",{type:"text",value:details[key]||"",placeholder:"Enter "+label.toLowerCase()+"…",onChange:e=>set(key,e.target.value),style:inp})
          )
        ),
        // Custom fields
        (details.customs||[]).map((f,i)=>
          h("div",{key:i,style:{display:"flex",gap:8,alignItems:"flex-end"}},
            h("div",{style:{flex:1}},
              h("input",{type:"text",value:f.name,placeholder:"Field name",onChange:e=>setCustom(i,"name",e.target.value),style:{...inp,marginBottom:4,fontSize:11,color:T.sub}}),
              h("input",{type:"text",value:f.value,placeholder:"Value…",onChange:e=>setCustom(i,"value",e.target.value),style:inp})
            ),
            h("button",{onClick:()=>removeCustom(i),style:{background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:18,padding:"4px",marginBottom:2,flexShrink:0}},"×")
          )
        ),
        // Add custom field
        addingField
          ? h("div",{style:{background:faint,borderRadius:8,padding:10}},
              lbl("New Custom Field"),
              h("input",{type:"text",value:newField.name,placeholder:"Field name (e.g. Handle Finish)",onChange:e=>setNewField(f=>({...f,name:e.target.value})),style:{...inp,marginBottom:6}}),
              h("input",{type:"text",value:newField.value,placeholder:"Value…",onChange:e=>setNewField(f=>({...f,value:e.target.value})),style:{...inp,marginBottom:8}}),
              h("div",{style:{display:"flex",gap:6,justifyContent:"flex-end"}},
                h("button",{onClick:()=>setAddingField(false),style:{borderRadius:6,cursor:"pointer",fontSize:12,padding:"6px 12px",background:"transparent",color:T.sub,border:"1px solid "+T.border}},"Cancel"),
                h("button",{onClick:addCustom,style:{borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700,padding:"6px 14px",background:T.text,color:"#FFF",border:"none"}},"+ Add")
              )
            )
          : h("button",{onClick:()=>setAddingField(true),style:{width:"100%",background:"transparent",border:"2px dashed "+T.border,borderRadius:8,padding:"8px",fontSize:12,color:T.sub,cursor:"pointer"}},"+ Add Custom Field")
      )
    ),

    // FILES TAB
    tab==="files"&&h("div",{style:{padding:"14px 16px"}},
      // Upload buttons
      h("div",{style:{display:"flex",gap:8,marginBottom:14}},
        h("label",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:T.blue+"12",border:"1.5px dashed "+T.blue+"44",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:12,fontWeight:600,color:T.blue}},
          h("input",{type:"file",accept:"image/*",capture:"environment",onChange:handleFile,style:{display:"none"}}),
          "📷 Photo"
        ),
        h("label",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:T.blue+"12",border:"1.5px dashed "+T.blue+"44",borderRadius:8,padding:"10px",cursor:"pointer",fontSize:12,fontWeight:600,color:T.blue}},
          h("input",{type:"file",accept:"image/*,application/pdf,.doc,.docx",onChange:handleFile,style:{display:"none"}}),
          "📄 File / PDF"
        )
      ),
      // File list
      (details.files||[]).length===0&&h("div",{style:{fontSize:12,color:T.dim,textAlign:"center",padding:24}},"No files yet. Upload photos, drawings, or signed quotes."),
      (details.files||[]).map(f=>
        h("div",{key:f.id,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid "+line}},
          // Thumbnail or icon
          f.type.startsWith("image")
            ? h("img",{src:f.data,style:{width:48,height:48,objectFit:"cover",borderRadius:6,flexShrink:0}})
            : h("div",{style:{width:48,height:48,background:faint,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},"📄"),
          h("div",{style:{flex:1,minWidth:0}},
            h("div",{style:{fontSize:13,fontWeight:600,color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},f.name),
            h("div",{style:{fontSize:11,color:T.dim}},f.date)
          ),
          // View button for images
          f.type.startsWith("image")&&h("a",{href:f.data,target:"_blank",style:{fontSize:11,color:T.blue,textDecoration:"none",flexShrink:0}},"View"),
          f.type==="application/pdf"&&h("a",{href:f.data,target:"_blank",style:{fontSize:11,color:T.blue,textDecoration:"none",flexShrink:0}},"Open"),
          h("button",{onClick:()=>removeFile(f.id),style:{background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:16,padding:"0 2px",flexShrink:0}},"×")
        )
      )
    )
  );
}






//  -- NotesLog --
function NotesLog({projId, projNotes, setProjNotes, currentUser, T, line, faint}) {
  const notes = (projNotes[projId]||[]).slice().reverse(); // newest first
  const [text, setText] = React.useState("");
  const taRef = React.useRef(null);
  const [confirmNote, setConfirmNote] = React.useState(null);

  function addNote() {
    const t = text.trim();
    if(!t) return;
    const note = {
      id: Date.now(),
      text: t,
      ts: new Date().toISOString(),
      author: currentUser?.name || "Admin"
    };
    setProjNotes(p=>({...p,[projId]:[...(p[projId]||[]),note]}));
    setText("");
    if(taRef.current) e.target.style.height = "auto";
  }

  function deleteNote(id) {
    setProjNotes(p=>({...p,[projId]:(p[projId]||[]).filter(n=>n.id!==id)}));
  }

  function fmtNoteDate(iso) {
    const d = new Date(iso);
    const today = new Date();
    const isToday = d.toDateString()===today.toDateString();
    const time = d.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    if(isToday) return "Today "+time;
    return d.toLocaleDateString([],{month:"short",day:"numeric"})+" · "+time;
  }

  return h("div",{style:{borderTop:"1px solid "+line}},
    // Add note input
    h("div",{style:{padding:"10px 16px",borderBottom:notes.length?"1px solid "+line:"none"}},
      h("div",{style:{fontSize:10,fontWeight:700,color:T.sub,letterSpacing:"0.06em",textTransform:"uppercase",marginBottom:6}},"Notes"),
      h("div",{style:{display:"flex",gap:8,alignItems:"flex-end"}},
        h("textarea",{
          ref:taRef,
          value:text,
          placeholder:"Add a note…",
          onChange:e=>{setText(e.target.value);e.target.style.height="auto";e.target.style.height=e.target.scrollHeight+"px";},
          onKeyDown:e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();addNote();} },
          rows:1,
          style:{flex:1,background:faint,border:"1px solid "+T.border,borderRadius:8,color:T.text,fontSize:13,padding:"8px 10px",outline:"none",resize:"none",lineHeight:1.5,fontFamily:"inherit",overflow:"hidden",boxSizing:"border-box"}
        }),
        h("button",{onClick:addNote,style:{background:T.text,color:"#FFF",border:"none",borderRadius:8,padding:"8px 14px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap"}},"Add")
      ),
      h("div",{style:{fontSize:10,color:T.dim,marginTop:4}},"Enter to save · Shift+Enter for new line")
    ),

    // Notes list
    notes.map(note=>
      h("div",{key:note.id,style:{padding:"10px 16px",borderBottom:"1px solid "+line,position:"relative"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
          h("span",{style:{fontSize:11,fontWeight:700,color:T.text}},note.author),
          h("span",{style:{fontSize:10,color:T.dim}},fmtNoteDate(note.ts)),
          h("button",{onClick:()=>setConfirmNote(note),style:{marginLeft:"auto",background:"none",border:"none",color:T.dim,cursor:"pointer",fontSize:13,padding:"0 2px",lineHeight:1}},"×")
        ),
        h("div",{style:{fontSize:13,color:T.text,lineHeight:1.6,whiteSpace:"pre-wrap"}},note.text)
      )
    ),

    // Confirm delete
    confirmNote&&h("div",{onClick:()=>setConfirmNote(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h("div",{onClick:e=>e.stopPropagation(),style:{background:"#FFF",borderRadius:16,padding:24,width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}},
        h("div",{style:{fontSize:15,fontWeight:700,color:"#1C1917",marginBottom:6}},"Delete note?"),
        h("div",{style:{fontSize:12,color:"#78716C",marginBottom:4}},"by "+confirmNote.author+" · "+fmtNoteDate(confirmNote.ts)),
        h("div",{style:{fontSize:13,color:"#44403C",marginBottom:16,lineHeight:1.5,maxHeight:80,overflow:"hidden",textOverflow:"ellipsis"}},confirmNote.text),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:()=>setConfirmNote(null),style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,padding:"8px 16px",background:"transparent",color:"#78716C",border:"1px solid #E5E2DC"}},"Cancel"),
          h("button",{onClick:()=>{deleteNote(confirmNote.id);setConfirmNote(null);},style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,padding:"8px 16px",background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA"}},"Delete")
        )
      )
    )
  );
}

//  -- ProjectExpanded --
function ProjectExpanded({proj,emps,done,active,cogs,setCogs,projDetails,setProjDetails,projNotes,setProjNotes,
  activeFor,clockIn,clockOut,fmtHrs,fmtTime,fmtCost,
  T,secLabel,card,entryCost,projCogsTotals,currentUser,
  setLf,setLogSheet,setEditingProj,setPf,setConfirmProj,setConfirmEntry,
  STATUSES,LiveTimer,Btn,ProjEmpLog,ProjectDetails,VendorBreakdown,NotesLog}) {

  const [openSection,setOpenSection] = React.useState(null);
  const projDone = done.filter(e=>e.projId===proj.id).sort((a,b)=>b.start-a.start);
  const hrs = projDone.reduce((s,e)=>s+(e.end-e.start),0);
  const isLive = active.some(e=>e.projId===proj.id);
  const ct = projCogsTotals(proj.id);
  const details = projDetails[proj.id]||{};
  const hasDetails = details.material||details.finish||details.hardware||details.doorProfile||(details.customs||[]).length>0;

  function Section({id, label, badge, children}) {

      h("div",{onClick:()=>setOpenSection(isOpen?null:id),

        h("span",{style:{flex:1,fontSize:12,fontWeight:600,color:T.text}},label),
        badge&&h("span",{style:{fontSize:11,fontWeight:600,color:T.sub}},badge),
        h("span",{style:{fontSize:11,color:T.dim}},isOpen?"▲":"▼")
      ),
      isOpen&&h("div",{style:{borderTop:"1px solid "+T.line}},children)
    );
  }

  return h("div",{style:{borderTop:"1px solid "+T.line}},

    // ── Quick actions row ──
    h("div",{style:{padding:"10px 16px",display:"flex",gap:6,flexWrap:"wrap",borderBottom:"1px solid "+T.line}},
      h(Btn,{label:"+ Log",size:"sm",variant:"ghost",onClick:()=>{setLf({empId:"",projId:String(proj.id),hours:"",date:new Date().toISOString().slice(0,10)});setLogSheet({});}}),
      h(Btn,{label:"✏ Edit",size:"sm",variant:"ghost",onClick:e=>{e.stopPropagation();setPf({name:proj.name,client:proj.client,status:proj.status,deadline:proj.deadline,assignedTo:[...proj.assignedTo],salePrice:proj.salePrice||"",notes:proj.notes||""});setEditingProj(proj.id);}}),
      h(Btn,{label:"Delete",size:"sm",variant:"danger",onClick:()=>setConfirmProj(proj)})
    ),

    // ── Time Log ──
    h(Section,{id:"timelog",label:"Time Log",badge:hrs>0?fmtHrs(hrs):projDone.length===0?"No entries":null},
      h("div",{style:{padding:"10px 16px"}},
        projDone.length===0
          ? h("div",{style:{fontSize:12,color:T.dim,padding:"4px 0"}},"No hours logged yet.")
          : h(ProjEmpLog,{entries:projDone,emps,onDelete:setConfirmEntry})
      )
    ),

    // ── Materials / COGS ──
    h(Section,{id:"cogs",label:"Costs",badge:ct.total>0?fmtCost(ct.total):null},
      h(VendorBreakdown,{projId:proj.id,cogs,fmtCost,T,secLabel,line:T.line,faint:T.faint})
    ),

    // ── Notes log ──
    h(NotesLog,{projId:proj.id,projNotes,setProjNotes,currentUser,T,line:T.line,faint:T.faint}),

    // ── Client Selections & Files ──
    h(Section,{id:"details",label:"Selections & Photos",
      badge:hasDetails||hasFiles?([(hasDetails?"Selections":""),hasFiles?(details.files.length+" file"+(details.files.length!==1?"s":"")):""].filter(Boolean).join(" · ")):null},
      h(ProjectDetails,{projId:proj.id,projDetails,setProjDetails,T,line:T.line,faint:T.faint,secLabel})
    )
  );
}

//  -- VendorBreakdown --
function VendorBreakdown({projId,cogs,fmtCost,T,secLabel,line,faint}) {
  const [openVendor,setOpenVendor] = React.useState(null);
  const projItems = cogs[projId]||cogs[String(projId)]||cogs[+projId]||[];
  if(!projItems.length) return null;

  // Group by vendor name (trim + fallback)
  const byVendor={};
  projItems.forEach(i=>{
    const k=(i.vendor&&i.vendor.trim())?i.vendor.trim():"No Vendor";
    if(!byVendor[k]) byVendor[k]=[];
    byVendor[k].push(i);
  });
  const sorted=Object.entries(byVendor).sort((a,b)=>
    b[1].reduce((s,i)=>s+(+i.amount||0),0) - a[1].reduce((s,i)=>s+(+i.amount||0),0)
  );
  const total=sorted.reduce((s,[,items])=>s+items.reduce((ss,i)=>ss+(+i.amount||0),0),0);

  return h("div",{style:{padding:"14px 16px",borderTop:"1px solid "+line}},
    h("div",{style:secLabel},"Cost by Vendor"),
    sorted.map(([name,items])=>{
      const amt=items.reduce((s,i)=>s+(+i.amount||0),0);
      const isOpen=openVendor===name;
      return h("div",{key:name,style:{marginBottom:6,background:faint,borderRadius:8,overflow:"hidden"}},
        // Vendor row — tap to expand
        h("div",{onClick:()=>setOpenVendor(isOpen?null:name),style:{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",cursor:"pointer"}},
          h("span",{style:{flex:1,fontSize:13,fontWeight:600,color:T.text}},name),
          h("span",{style:{fontSize:13,fontWeight:700,color:T.blue}},fmtCost(amt)),
          h("span",{style:{fontSize:11,color:T.dim,marginLeft:4}},isOpen?"▲":"▼")
        ),
        // Line items
        isOpen&&h("div",{style:{borderTop:"1px solid "+line}},
          items.sort((a,b)=>b.date.localeCompare(a.date)).map(i=>
            h("div",{key:i.id,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",borderBottom:"1px solid "+line}},
              h("span",{style:{flex:1,fontSize:12,color:T.sub}},i.desc||i.category),
              i.invoiceNo&&h("span",{style:{fontSize:11,color:T.dim}},"#"+i.invoiceNo),
              h("span",{style:{fontSize:11,color:T.dim,marginLeft:4}},i.date),
              h("span",{style:{fontSize:12,fontWeight:600,color:T.blue,marginLeft:8}},fmtCost(+i.amount||0))
            )
          )
        )
      );
    }),
    total>0&&h("div",{style:{display:"flex",justifyContent:"space-between",paddingTop:8,marginTop:4,borderTop:"1px solid "+line}},
      h("span",{style:{fontSize:11,color:T.sub}},"Total materials"),
      h("span",{style:{fontSize:13,fontWeight:700,color:T.blue}},fmtCost(total))
    )
  );
}


//  -- ClientsTab --
function ClientsTab({clients,setClients,projs,setProjs,cogs,done,emps,entryCost,fmtHrs,fmtCost,T,card,secLabel,setAdminTab,setPf,setEditingProj}) {
  const [expandClient,setExpandClient] = React.useState(null);

}


//  -- ReceiptSheet --
function ReceiptSheet({info, cogs, setCogs, vendors, onClose}) {
  const {empId, projId, projName, empName} = info;
  const [scanning, setScanning] = React.useState(false);
  const [scanError, setScanError] = React.useState("");
  const [form, setForm] = React.useState({desc:"", amount:"", vendor:"", date:new Date().toISOString().slice(0,10), invoiceNo:""});
  const [saved, setSaved] = React.useState(false);
  const inp = {width:"100%",background:"#F5F3F0",border:"1px solid #E5E2DC",borderRadius:8,color:"#1C1917",padding:"9px 12px",fontSize:13,outline:"none",boxSizing:"border-box"};
  const lbl = txt => h("div",{style:{fontSize:10,fontWeight:700,color:"#78716C",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:4}},txt);

  async function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    setScanning(true); setScanError("");
    try {
      const compressed = await new Promise((res,rej)=>{
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = ()=>{
          const maxSize=1200; let w=img.width,h=img.height;
          if(w>maxSize||h>maxSize){ if(w>h){h=Math.round(h*maxSize/w);w=maxSize;}else{w=Math.round(w*maxSize/h);h=maxSize;} }
          const canvas=document.createElement("canvas"); canvas.width=w; canvas.height=h;
          canvas.getContext("2d").drawImage(img,0,0,w,h);
          URL.revokeObjectURL(url); res(canvas.toDataURL("image/jpeg",0.85).split(",")[1]);
        };
        img.onerror=rej; img.src=url;
      });
      const _p=["sk-ant-","api03-lseec4PTi7dp","BIK1iN3rrsrlEfqKXW3","c0X0_RcPYM8zL56LJTs","W05lb-lMIwuU2GAmqUs","8Gz2qtSgCDzeb164w-2","_u9LQAA"].join("");
      const resp = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":_p,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:"image/jpeg",data:compressed}},
          {type:"text",text:"Extract from this receipt and return ONLY valid JSON with keys: vendor, amount (number), date (YYYY-MM-DD), description (max 60 chars), invoiceNo. Use null for missing."}
        ]}]})
      });
      const data = await resp.json();
      const text = data.content?.[0]?.text;
      if(!text) throw new Error("No response");
      const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
      setForm(f=>({...f,
        vendor: parsed.vendor||f.vendor,
        amount: parsed.amount?String(parsed.amount):f.amount,
        date:   parsed.date||f.date,
        desc:   parsed.description||f.desc,
        invoiceNo: parsed.invoiceNo||f.invoiceNo,
      }));
    } catch(err) {
      setScanError("Could not read receipt — fill in manually.");
    }
    setScanning(false);
    e.target.value="";
  }

  function save() {
    if(!form.amount||!+form.amount) return;
    const item = {id:Date.now(), desc:form.desc, amount:+form.amount, vendor:form.vendor, date:form.date, invoiceNo:form.invoiceNo||"", uploadedBy:empName};
    setCogs(p=>({...p,[projId]:[...(p[projId]||[]),item]}));
    setSaved(true);
    setTimeout(onClose, 1200);
  }

  return h(Sheet,{title:"Upload Receipt — "+projName, onClose},
    // Scan buttons
    !saved&&h("div",null,
      scanning
        ? h("div",{style:{background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:16,textAlign:"center",marginBottom:12}},
            h("div",{style:{fontSize:13,color:"#3B82F6",fontWeight:600}},"⟳ Reading receipt…")
          )
        : h("div",{style:{display:"flex",gap:8,marginBottom:12}},
            h("label",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:12,cursor:"pointer",textAlign:"center"}},
              h("input",{type:"file",accept:"image/*",capture:"environment",onChange:handleFile,style:{display:"none"}}),
              h("div",{style:{fontSize:22}},"📷"),
              h("div",{style:{fontSize:12,fontWeight:600,color:"#3B82F6"}},"Take Photo")
            ),
            h("label",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"#EFF6FF",border:"2px dashed #93C5FD",borderRadius:10,padding:12,cursor:"pointer",textAlign:"center"}},
              h("input",{type:"file",accept:"image/*,application/pdf",onChange:handleFile,style:{display:"none"}}),
              h("div",{style:{fontSize:22}},"📄"),
              h("div",{style:{fontSize:12,fontWeight:600,color:"#3B82F6"}},"Choose File")
            )
          ),
      scanError&&h("div",{style:{fontSize:11,color:"#EF4444",marginBottom:8,textAlign:"center"}},scanError),

      // Form
      h("div",{style:{marginBottom:8}}, lbl("Description"), h("input",{type:"text",value:form.desc,onChange:e=>setForm(f=>({...f,desc:e.target.value})),placeholder:"What was purchased?",style:inp})),
      h("div",{style:{marginBottom:8}}, lbl("Amount ($)"), h("input",{type:"number",min:0,step:0.01,value:form.amount,onChange:e=>setForm(f=>({...f,amount:e.target.value})),placeholder:"0.00",style:inp})),
      h("div",{style:{marginBottom:8}}, lbl("Vendor"), h("input",{type:"text",value:form.vendor,onChange:e=>setForm(f=>({...f,vendor:e.target.value})),placeholder:"Store / supplier name",style:inp})),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}},
        h("div",null, lbl("Invoice #"), h("input",{type:"text",value:form.invoiceNo,onChange:e=>setForm(f=>({...f,invoiceNo:e.target.value})),placeholder:"Optional",style:inp})),
        h("div",null, lbl("Date"), h("input",{type:"date",value:form.date,onChange:e=>setForm(f=>({...f,date:e.target.value})),style:inp}))
      ),
      h("button",{onClick:save,style:{width:"100%",background:"#1C1917",color:"#FFF",border:"none",borderRadius:8,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer"}},"✓ Submit Receipt")
    ),

    saved&&h("div",{style:{textAlign:"center",padding:32}},
      h("div",{style:{fontSize:40,marginBottom:8}},"✅"),
      h("div",{style:{fontSize:16,fontWeight:700,color:"#16A34A"}}),"Receipt submitted!")
  );
}


//  -- DateFilter --
function DateFilter({range,setRange,offset,setOffset,customStart,setCustomStart,customEnd,setCustomEnd,T}) {
  const now = new Date();
  let label = "";
  if(range==="week"){

// Helper to get window from DateFilter state
function getDateWindow(range,offset,customStart,customEnd) {
  const now = new Date();
  if(range==="week"){
    const d=new Date(now); d.setDate(d.getDate()-d.getDay()+offset*7); d.setHours(0,0,0,0);
    const e2=new Date(d); e2.setDate(e2.getDate()+7);
    return {winStart:d.getTime(),winEnd:e2.getTime()};
  } else if(range==="month"){
    const d=new Date(now.getFullYear(),now.getMonth()+offset,1);
    const e2=new Date(d.getFullYear(),d.getMonth()+1,1);
    return {winStart:d.getTime(),winEnd:e2.getTime()};
  } else if(range==="year"){
    const yr=now.getFullYear()+offset;
    return {winStart:new Date(yr,0,1).getTime(),winEnd:new Date(yr+1,0,1).getTime()};
  } else if(range==="custom"&&customStart){
    return {winStart:new Date(customStart).getTime(),winEnd:customEnd?new Date(customEnd+"T23:59:59").getTime():Date.now()};
  }
  return {winStart:null,winEnd:null};
}


//  -- makeDragSort -- (no hooks, safe to call anywhere)
function makeDragSort(items, setItems) {
  let dragFrom = null;
  let dragTo = null;
  let touchFrom = null;

  function itemProps(i) {
    return {
      draggable: true,
      'data-sortidx': String(i),
      onDragStart: () => { dragFrom = i; },
      onDragEnter: () => { dragTo = i; },
      onDragOver: e => e.preventDefault(),
      onDragEnd: () => {
        if(dragFrom !== null && dragTo !== null && dragFrom !== dragTo) {
          const next = [...items];
          const [moved] = next.splice(dragFrom, 1);
          next.splice(dragTo, 0, moved);
          setItems(next);
        }
        dragFrom = null; dragTo = null;
      },
      onTouchStart: e => { touchFrom = i; },
      onTouchEnd: e => {
        const t = e.changedTouches[0];
        const el = document.elementFromPoint(t.clientX, t.clientY);
        const card = el && el.closest('[data-sortidx]');
        const to = card ? parseInt(card.getAttribute('data-sortidx')) : null;
        if(to !== null && to !== touchFrom) {
          const next = [...items];
          const [moved] = next.splice(touchFrom, 1);
          next.splice(to, 0, moved);
          setItems(next);
        }
        touchFrom = null;
      },
    };
  }
  return { itemProps };
}

      onSave:(newEntries)=>{setEntries(p=>[...p,...newEntries]);setImportSheet(false);}
    }),

    cogsSheet&&(()=>{
      const proj=projs.find(p=>p.id===cogsSheet);
      if(!proj)return null;
      return h(CogsSheet,{
        projId:cogsSheet, proj, cogs, setCogs, vendors,
        onBudgetChange:(val)=>setProjs(p=>p.map(x=>x.id===cogsSheet?{...x,budget:val}:x)),
        onClose:()=>setCogsSheet(null),
        onAddVendor:(name)=>setVendors(p=>[...p,{id:Date.now(),name}])
      });
    })(),
    confirmEntry&&h(Confirm,{entry:confirmEntry,emps,projs,onConfirm:()=>deleteEntry(confirmEntry.id),onCancel:()=>setConfirmEntry(null)}),

    // Project delete confirm
    confirmProj&&h("div",{onClick:()=>setConfirmProj(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h("div",{onClick:e=>e.stopPropagation(),style:{background:"#FFF",borderRadius:16,padding:24,width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}},
        h("div",{style:{fontSize:16,fontWeight:700,color:"#1C1917",marginBottom:6}},"Delete project?"),
        h("div",{style:{fontSize:14,color:"#78716C",marginBottom:4}},confirmProj.name),
        confirmProj.client&&h("div",{style:{fontSize:12,color:"#A8A29E",marginBottom:4}},confirmProj.client),
        h("div",{style:{fontSize:12,color:"#DC2626",marginBottom:20}},"This will delete all time logs for this project."),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:()=>setConfirmProj(null),style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,padding:"8px 16px",background:"transparent",color:"#78716C",border:"1px solid #E5E2DC"}},"Cancel"),
          h("button",{onClick:()=>{delProj(confirmProj.id);setConfirmProj(null);},style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,padding:"8px 16px",background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA"}},"Delete")
        )
      )
    ),

    // Employee delete confirm
    confirmEmp&&h("div",{onClick:()=>setConfirmEmp(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h("div",{onClick:e=>e.stopPropagation(),style:{background:"#FFF",borderRadius:16,padding:24,width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}},
        h("div",{style:{fontSize:16,fontWeight:700,color:"#1C1917",marginBottom:6}},"Remove employee?"),
        h("div",{style:{fontSize:14,color:"#78716C",marginBottom:4}},confirmEmp.name),
        h("div",{style:{fontSize:12,color:"#A8A29E",marginBottom:4}},confirmEmp.role),
        h("div",{style:{fontSize:12,color:"#DC2626",marginBottom:20}},"This will delete all their time logs."),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:()=>setConfirmEmp(null),style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,padding:"8px 16px",background:"transparent",color:"#78716C",border:"1px solid #E5E2DC"}},"Cancel"),
          h("button",{onClick:()=>{delEmp(confirmEmp.id);setConfirmEmp(null);},style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,padding:"8px 16px",background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA"}},"Delete")
        )
      )
    ),

    // Vendor delete confirm
    confirmVendor&&h("div",{onClick:()=>setConfirmVendor(null),style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}},
      h("div",{onClick:e=>e.stopPropagation(),style:{background:"#FFF",borderRadius:16,padding:24,width:"100%",maxWidth:320,boxShadow:"0 8px 40px rgba(0,0,0,0.15)"}},
        h("div",{style:{fontSize:16,fontWeight:700,color:"#1C1917",marginBottom:6}},"Remove vendor?"),
        h("div",{style:{fontSize:14,color:"#78716C",marginBottom:20}},confirmVendor.name),
        h("div",{style:{display:"flex",gap:8,justifyContent:"flex-end"}},
          h("button",{onClick:()=>setConfirmVendor(null),style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,padding:"8px 16px",background:"transparent",color:"#78716C",border:"1px solid #E5E2DC"}},"Cancel"),
          h("button",{onClick:()=>{setVendors(p=>p.filter(x=>x.id!==confirmVendor.id));setConfirmVendor(null);},style:{borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,padding:"8px 16px",background:"#FEF2F2",color:"#DC2626",border:"1px solid #FECACA"}},"Remove")
        )
      )
    )
  );
}

// Error boundary wrapper
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state={error:null}; }
  static getDerivedStateFromError(e) { return {error:e}; }
  render() {
    if(this.state.error) {
      return React.createElement("div",{style:{padding:32,fontFamily:"sans-serif",color:"#DC2626",lineHeight:1.6}},
        React.createElement("div",{style:{fontSize:18,fontWeight:700,marginBottom:8}},"Something went wrong"),
        React.createElement("div",{style:{fontSize:13,color:"#78716C",marginBottom:16}},"Please reload the page. If the problem persists, try clearing your browser cache."),
        React.createElement("details",{style:{fontSize:11,color:"#A8A29E"}},
          React.createElement("summary",null,"Error details"),
          React.createElement("pre",{style:{marginTop:8,whiteSpace:"pre-wrap",fontSize:10}},String(this.state.error))
        ),
        React.createElement("button",{onClick:()=>window.location.reload(),style:{marginTop:16,background:"#1C1917",color:"#FFF",border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,cursor:"pointer"}},"Reload App")
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ErrorBoundary,null,React.createElement(App)));
</script>
</body>
</html>
